<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wholesale Orders - Sunshine Wholesale</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <div class="logo">Sunshine Wholesale Portal</div>
        <nav class="nav">
          <a href="/">View Site</a>
          <a href="/logout" class="button button-outline">Logout</a>
        </nav>
      </div>
    </header>

    <main class="section purchasing-page">
      <div class="section-inner container">
        <div class="purchasing-layout has-cart">
          <aside class="filters-sidebar" id="filters-sidebar" aria-label="Filters">
            <h2 class="filters-sidebar__title">Filters</h2>
            <div class="filter-section" id="filter-department">
              <button type="button" class="filter-section__header" aria-expanded="true" aria-controls="department-list" id="department-toggle">
                <span class="filter-section__icon" aria-hidden="true">▣</span>
                <span>Department</span>
                <span id="department-count">(0)</span>
              </button>
              <ul class="filter-section__list" id="department-list" role="group">
                <li><label><input type="radio" name="department" value="" checked /> All Departments</label></li>
              </ul>
            </div>
            <div class="filter-section" id="filter-category">
              <button type="button" class="filter-section__header" aria-expanded="true" aria-controls="category-list" id="category-toggle">
                <span class="filter-section__icon" aria-hidden="true">◉</span>
                <span>Category</span>
                <span id="category-count">(0)</span>
              </button>
              <ul class="filter-section__list" id="category-list" role="group">
                <li><label><input type="radio" name="category" value="" checked /> All Categories</label></li>
              </ul>
            </div>
          </aside>
          <div class="products-main">
            <div class="products-main__header">
              <h1 class="products-main__title">Products</h1>
              <span class="products-main__count" id="products-count">(0 Found)</span>
            </div>
            <p style="margin: -0.5rem 0 0.75rem; font-size: 0.9rem; color: var(--muted);">Build your order and send it to Sunshine Wholesale.</p>
            <div class="products-toolbar">
              <input type="search" id="product-search" class="products-toolbar__search" placeholder="Search by product name or code..." aria-label="Search products" />
              <div class="sort-buttons">
                <button type="button" class="sort-btn active" data-sort="name" aria-pressed="true">Name</button>
                <button type="button" class="sort-btn" data-sort="code" aria-pressed="false">Code</button>
              </div>
            </div>
            <div id="product-grid" class="product-grid">
              <p id="products-loading" class="products-loading">Loading products…</p>
            </div>
          </div>
          <aside class="cart-panel">
          <h2>Your Order</h2>
          <p class="cart-hint">Add items from the catalog, then send us your order to prepare.</p>
          <div id="cart-empty" class="cart-empty">No items in your order yet.</div>
          <ul id="cart-items" class="cart-items" hidden></ul>
          <div class="cart-summary">
            <span>Total items:</span>
            <span id="cart-total">0</span>
          </div>
          <form id="checkout-form" class="checkout-form">
            <h3>Contact details</h3>
            <label>
              Your name
              <input type="text" id="customer-name" required />
            </label>
            <label>
              Business name
              <input type="text" id="business-name" />
            </label>
            <label>
              Email
              <input type="email" id="customer-email" required />
            </label>
            <label>
              Phone
              <input type="tel" id="customer-phone" />
            </label>
            <label>
              Notes (delivery window, special instructions)
              <textarea id="order-notes" rows="3"></textarea>
            </label>
            <button type="submit" class="button full-width">Send order to Sunshine Wholesale</button>
            <p id="checkout-message" class="checkout-message" hidden></p>
          </form>
          </aside>
        </div>
      </div>
    </main>

    <script>
      const searchInput = document.getElementById('product-search');
      const gridEl = document.getElementById('product-grid');
      const loadingEl = document.getElementById('products-loading');
      const countEl = document.getElementById('products-count');
      const departmentList = document.getElementById('department-list');
      const categoryList = document.getElementById('category-list');
      const departmentCountEl = document.getElementById('department-count');
      const categoryCountEl = document.getElementById('category-count');
      const cartItemsEl = document.getElementById('cart-items');
      const cartEmptyEl = document.getElementById('cart-empty');
      const cartTotalEl = document.getElementById('cart-total');
      const checkoutForm = document.getElementById('checkout-form');
      const checkoutMessage = document.getElementById('checkout-message');

      let allProducts = [];
      let subcategoriesByCategory = {};
      let subcategoryLabels = {};
      let sortBy = 'name';
      const cart = [];
      const CART_KEY = 'sunshine_cart';
      (function loadCartFromStorage() {
        try {
          const raw = localStorage.getItem(CART_KEY);
          if (raw) {
            const stored = JSON.parse(raw);
            if (Array.isArray(stored) && stored.length > 0) {
              stored.forEach((item) => {
                const existing = cart.find((i) => i.code === item.code);
                if (existing) existing.quantity += item.quantity;
                else cart.push({ code: item.code, name: item.name, quantity: item.quantity });
              });
              localStorage.removeItem(CART_KEY);
            }
          }
        } catch (e) {}
      })();

      function labelFromKey(key) {
        return (key || '').replace(/-/g, ' & ').replace(/\b\w/g, (c) => c.toUpperCase());
      }

      function buildSidebarFilters(products) {
        const byCat = {};
        products.forEach((p) => {
          const c = (p.category || '').toLowerCase().replace(/\s+/g, '-');
          const s = (p.subcategory || '').toLowerCase().replace(/\s+/g, '-');
          if (!c) return;
          if (!byCat[c]) byCat[c] = new Set();
          if (s) byCat[c].add(s);
          subcategoryLabels[s] = labelFromKey(s);
        });
        subcategoriesByCategory = Object.fromEntries(
          Object.entries(byCat).map(([k, set]) => [k, Array.from(set)])
        );
        const depts = Object.keys(subcategoriesByCategory).sort();
        const subs = [...new Set(Object.values(subcategoriesByCategory).flat())].sort();
        departmentCountEl.textContent = '(' + (depts.length + 1) + ')';
        categoryCountEl.textContent = '(' + (subs.length + 1) + ')';
        depts.forEach((c) => {
          const li = document.createElement('li');
          li.innerHTML = '<label><input type="radio" name="department" value="' + escapeAttr(c) + '" /> ' + escapeHtml(labelFromKey(c)) + '</label>';
          departmentList.appendChild(li);
        });
        subs.forEach((s) => {
          const li = document.createElement('li');
          li.innerHTML = '<label><input type="radio" name="category" value="' + escapeAttr(s) + '" /> ' + escapeHtml(subcategoryLabels[s] || s) + '</label>';
          categoryList.appendChild(li);
        });
      }

      function getSelectedDepartment() {
        const r = document.querySelector('input[name="department"]:checked');
        return r ? r.value : '';
      }
      function getSelectedCategory() {
        const r = document.querySelector('input[name="category"]:checked');
        return r ? r.value : '';
      }

      function filterAndSortProducts() {
        const query = searchInput.value.toLowerCase();
        const department = getSelectedDepartment();
        const category = getSelectedCategory();
        return allProducts.filter((p) => {
          const c = (p.category || '').toLowerCase().replace(/\s+/g, '-');
          const s = (p.subcategory || '').toLowerCase().replace(/\s+/g, '-');
          const matchText = !query || (p.name || '').toLowerCase().includes(query) || (p.code || '').toLowerCase().includes(query);
          const matchDept = !department || c === department;
          const matchCat = !category || s === category;
          return matchText && matchDept && matchCat;
        }).sort((a, b) => {
          if (sortBy === 'code') return String(a.code || '').localeCompare(b.code || '');
          return String(a.name || '').localeCompare(b.name || '');
        });
      }

      function renderProductCard(p, withAddButton) {
        const u = Number(p.units_per_case) || 1;
        const casePrice = Number(p.case_price) || 0;
        const unitPrice = u > 0 ? casePrice / u : 0;
        const imgUrl = p.image_url || 'https://picsum.photos/seed/' + (p.code || '').replace(/-/g, '') + '/300/300';
        const meta = 'Item # ' + escapeHtml(p.code) + ' | ' + u + ' unit' + (u !== 1 ? 's' : '') + ' per case';
        const btn = withAddButton
          ? '<button type="button" class="product-card__add add-to-cart">Add to Cart</button>'
          : '';
        return (
          '<article class="product-card" data-name="' + escapeAttr(p.name) + '" data-code="' + escapeAttr(p.code) + '" data-category="' + escapeAttr(p.category) + '" data-subcategory="' + escapeAttr(p.subcategory) + '" data-units-per-case="' + escapeAttr(String(u)) + '" data-case-price="' + escapeAttr(String(casePrice)) + '">' +
          '<img src="' + escapeAttr(imgUrl) + '" alt="' + escapeAttr(p.name) + '" class="product-card__img" loading="lazy" />' +
          '<div class="product-card__body">' +
          '<h3>' + escapeHtml(p.name) + '</h3>' +
          '<p class="product-badge">In stock</p>' +
          '<p class="product-meta">' + meta + '</p>' +
          '<p class="product-price">$' + casePrice.toFixed(2) + ' (Case) · $' + unitPrice.toFixed(2) + '/unit</p>' +
          '</div>' + btn + '</article>'
        );
      }
      function escapeAttr(s) { return String(s || '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;'); }
      function escapeHtml(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

      function refreshGrid() {
        const list = filterAndSortProducts();
        countEl.textContent = '(' + list.length + ' Found)';
        const existing = gridEl.querySelectorAll('.product-card');
        existing.forEach((el) => el.remove());
        gridEl.insertAdjacentHTML('beforeend', list.map((p) => renderProductCard(p, true)).join(''));
        attachAddToCart();
      }

      document.getElementById('department-toggle').addEventListener('click', function () {
        const list = document.getElementById('department-list');
        const expanded = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', !expanded);
        list.hidden = expanded;
      });
      document.getElementById('category-toggle').addEventListener('click', function () {
        const list = document.getElementById('category-list');
        const expanded = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', !expanded);
        list.hidden = expanded;
      });
      document.getElementById('filters-sidebar').addEventListener('change', function (e) {
        if (e.target.matches('input[name="department"], input[name="category"]')) refreshGrid();
      });
      searchInput.addEventListener('input', refreshGrid);
      document.querySelectorAll('.sort-buttons .sort-btn').forEach((btn) => {
        btn.addEventListener('click', function () {
          sortBy = this.dataset.sort;
          document.querySelectorAll('.sort-buttons .sort-btn').forEach((b) => b.classList.remove('active'));
          this.classList.add('active');
          refreshGrid();
        });
      });

      function renderCart() {
        if (cart.length === 0) {
          cartEmptyEl.hidden = false;
          cartItemsEl.hidden = true;
          cartItemsEl.innerHTML = '';
          cartTotalEl.textContent = '0';
          return;
        }

        cartEmptyEl.hidden = true;
        cartItemsEl.hidden = false;
        cartItemsEl.innerHTML = '';

        let totalCount = 0;

        cart.forEach((item, index) => {
          totalCount += item.quantity;
          const li = document.createElement('li');
          li.className = 'cart-item';
          li.innerHTML = `
            <div>
              <div class="cart-item-main">${item.code} – ${item.name}</div>
              <div class="cart-item-sub">Qty: 
                <button type="button" data-index="${index}" data-action="decrease" class="cart-qty-btn">−</button>
                <span class="cart-qty">${item.quantity}</span>
                <button type="button" data-index="${index}" data-action="increase" class="cart-qty-btn">+</button>
              </div>
            </div>
            <button type="button" data-index="${index}" data-action="remove" class="cart-remove">Remove</button>
          `;
          cartItemsEl.appendChild(li);
        });

        cartTotalEl.textContent = totalCount.toString();
      }

      function addToCart(card) {
        const code = card.dataset.code;
        const name = card.dataset.name;

        const existing = cart.find((item) => item.code === code);
        if (existing) {
          existing.quantity += 1;
        } else {
          cart.push({ code, name, quantity: 1 });
        }
        renderCart();
      }

      function handleCartClick(event) {
        const btn = event.target.closest('button');
        if (!btn || btn.dataset.index === undefined) return;

        const index = Number(btn.dataset.index);
        const action = btn.dataset.action;
        const item = cart[index];
        if (!item) return;

        if (action === 'increase') {
          item.quantity += 1;
        } else if (action === 'decrease') {
          item.quantity -= 1;
          if (item.quantity <= 0) {
            cart.splice(index, 1);
          }
        } else if (action === 'remove') {
          cart.splice(index, 1);
        }

        renderCart();
      }

      function attachAddToCart() {
        document.querySelectorAll('.add-to-cart').forEach((btn) => {
          btn.addEventListener('click', () => addToCart(btn.closest('.product-card')));
        });
      }

      fetch('/api/products')
        .then((r) => r.json())
        .then((products) => {
          if (!Array.isArray(products) || products.length === 0) {
            if (loadingEl) loadingEl.textContent = 'No products available.';
            return;
          }
          allProducts = products;
          if (loadingEl) loadingEl.remove();
          buildSidebarFilters(products);
          refreshGrid();
        })
        .catch(() => {
          if (loadingEl) loadingEl.textContent = 'Could not load products. Please refresh the page.';
        });

      cartItemsEl.addEventListener('click', handleCartClick);

      checkoutForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        checkoutMessage.hidden = true;
        checkoutMessage.textContent = '';

        if (cart.length === 0) {
          checkoutMessage.hidden = false;
          checkoutMessage.textContent = 'Please add at least one item to your order.';
          checkoutMessage.className = 'checkout-message error';
          return;
        }

        const payload = {
          customer: {
            name: document.getElementById('customer-name').value.trim(),
            businessName: document.getElementById('business-name').value.trim(),
            email: document.getElementById('customer-email').value.trim(),
            phone: document.getElementById('customer-phone').value.trim(),
          },
          items: cart.map((item) => ({
            code: item.code,
            name: item.name,
            quantity: item.quantity,
          })),
          notes: document.getElementById('order-notes').value.trim(),
        };

        try {
          const response = await fetch('/api/order', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });

          if (response.status === 401) {
            checkoutMessage.hidden = false;
            checkoutMessage.textContent =
              'Your session has expired. Please log in again, then resend your order.';
            checkoutMessage.className = 'checkout-message error';
            return;
          }

          if (!response.ok) {
            throw new Error('Request failed');
          }

          checkoutMessage.hidden = false;
          checkoutMessage.textContent =
            'Thank you! Your order has been sent to Sunshine Wholesale. We will contact you to confirm.';
          checkoutMessage.className = 'checkout-message success';

          cart.splice(0, cart.length);
          renderCart();
          checkoutForm.reset();
        } catch (error) {
          checkoutMessage.hidden = false;
          checkoutMessage.textContent =
            'Something went wrong sending your order. Please try again or contact us by phone.';
          checkoutMessage.className = 'checkout-message error';
        }
      });

      renderCart();
    </script>
  </body>
  </html>
